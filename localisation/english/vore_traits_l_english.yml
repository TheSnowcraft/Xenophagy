# Predator Traits
# Organic Traits
 trait_vore_pred: "Hyper-Elastic Digestive System"
 trait_vore_pred_desc: "This species has developed a hyper-elastic digestive system that allows them to injest and digest people of a similar size as them whole without serious risk or discomfort."
 trait_vore_pred_effects: "Pops from this species will eat a number of other pops each month. The exact number eaten is determined by the number of predatory pops, and empire predation policies. Pops eaten will be selected based on species traits, social strata, and empire policy./n/nWill not eat Machine, Lithoid or Toxoid pops."

# Lithoid Traits
 trait_vore_lithoid_pred: "Hyper-Elastic Digestive System"
 trait_vore_lithoid_pred_desc: "This species has ahyper-elastic digestive system that allows them capablto injest and digest other lithoids - or machines - whole without serious risk or discomfort.""
 trait_vore_lithoid_pred_effects: "Pops from this species will eat a number of other pops each month. The exact number eaten is determined by the number of predatory pops, and empire predation policies. Pops eaten will be selected based on species traits, social strata, and empire policy./n/nWill not eat Organic pops, but will consume other Lithoids and Machines."

# Machine Traits
 trait_vore_predbot: "Enlarged Biofuel Processors"
 trait_vore_predbot_desc: "These machines have biofuel processing systems to generate power large enough to process the average organic."
 trait_vore_pred_effects: "Pops from this species will eat a number of other pops each month. The exact number eaten is determined by the number of predatory pops, and empire predation policies. Pops eaten will be selected based on species traits, social strata, and empire policy./n/nWill not eat Machine or Lithoid pops."

 trait_vore_machine_eater: "Internal Materials Processing System"
 trait_vore_machine_eater_desc: "These machines can injest and process other machines - or lithoids - for material."
 trait_vore_machine_eater_effects: "Pops from this species will eat a number of other pops each month. The exact number eaten is determined by the number of predatory pops, and empire predation policies. Pops eaten will be selected based on species traits, social strata, and empire policy./n/nWill not eat Organic pops, but will consume other Machines and Lithoids."

# Prey Traits
 trait_vore_prey: "Natural Prey"
 trait_vore_prey_desc: "This species responds to predation by other species by willingly surrendering to predators so others can survive."
 trait_vore_prey_effects: ""

 trait_vore_prey_artifical: "Artifical Prey"
 trait_vore_prey_artifical_desc: "This species has been modified to view themselves as food for others, treating their consumption by predators as a mundane occurance."
 trait_vore_prey_artifical_effects: ""

